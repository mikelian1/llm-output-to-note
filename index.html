<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Builder · 对话转知识笔记</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0d12;
      --panel: #121722;
      --panel-2: #171d2b;
      --text: #e7eaf3;
      --muted: #9ba3b6;
      --border: #283044;
      --accent: #5b8cff;
      --accent-2: #3f6ee8;
      --ok: #49d4a3;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      --radius: 12px;
      --toolbar-h: 30vh;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f7fb;
        --panel: #fff;
        --panel-2: #f2f5fa;
        --text: #1f2430;
        --muted: #5f6778;
        --border: #d7dced;
        --accent: #356bff;
        --accent-2: #1f56de;
        --ok: #149f70;
        --shadow: 0 8px 20px rgba(35, 49, 89, 0.08);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    .app {
      height: 100vh;
      width: 100%;
      padding: 16px;
      display: grid;
      grid-template-rows: minmax(190px, var(--toolbar-h)) minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }

    .toolbar {
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0,1fr);
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      min-height: 0;
      overflow: hidden;
    }
    .headline h1 { margin: 0 0 5px; font-size: 22px; }
    .headline p { margin: 0; color: var(--muted); font-size: 13px; }

    .toolbar-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 10px;
      align-items: start;
    }
    .tool-group {
      min-height: 0;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: grid;
      gap: 6px;
      align-content: start;
    }
    .label { font-size: 14px; font-weight: 700; color: var(--text); }
    .seg { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 6px; }
    .seg button, .btn, select, input[type='number'] {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .seg button, .btn { cursor: pointer; }
    .seg button.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .tip { font-size: 12px; color: var(--muted); line-height: 1.3; }
    .map-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    select, input[type='number'] { min-width: 80px; }
    .mapping-preview { font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: var(--muted); }
    .ops { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-2); }
    .copied { font-size: 12px; color: var(--ok); opacity: 0; transition: opacity .15s; }
    .copied.show { opacity: 1; }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 14px;
      overflow: hidden;
    }
    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0,1fr);
      overflow: hidden;
      padding: 12px;
      gap: 10px;
    }
    .pane h2 { margin: 0; font-size: 15px; }
    textarea, pre {
      width: 100%;
      min-height: 0;
      height: 100%;
      margin: 0;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    textarea { resize: none; }

    @media (max-width: 1100px) {
      :root { --toolbar-h: 34vh; }
      .toolbar-grid { grid-template-columns: 1fr 1fr; }
      .tool-group:last-child { grid-column: 1 / -1; }
      .workspace { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card toolbar">
      <div class="headline">
        <h1>对话内容 → Markdown 知识笔记 Prompt 生成器</h1>
        <p>固定视口布局，配置即改即生效；仅输入框与 Prompt 区可独立滚动。</p>
      </div>
      <div class="toolbar-grid">
        <div class="tool-group">
          <span class="label">压缩等级</span>
          <div class="seg" id="compressionSeg"></div>
          <div class="tip" id="compressionDesc"></div>
        </div>

        <div class="tool-group">
          <span class="label">标题映射</span>
          <div class="map-row">
            <select id="mapMode">
              <option value="unchanged">保持不变</option>
              <option value="up">上移</option>
              <option value="down">下移</option>
            </select>
            <input id="mapLevel" type="number" min="1" max="3" value="1" />
            <span class="tip">级</span>
          </div>
          <div id="mappingPreview" class="mapping-preview"></div>
        </div>

        <div class="tool-group">
          <span class="label">Prompt 操作</span>
          <div class="ops">
            <button class="btn primary" id="copyBtn">复制 Prompt</button>
            <button class="btn" id="clearBtn">清空内容</button>
            <button class="btn" id="resetBtn">恢复默认</button>
            <span id="copied" class="copied">Copied</span>
          </div>
        </div>
      </div>
    </section>

    <section class="workspace">
      <section class="card pane">
        <h2>待改写内容 {{CONTENT}}</h2>
        <textarea id="contentInput" placeholder="在这里粘贴原始对话内容…"></textarea>
      </section>

      <section class="card pane">
        <h2>最终 Prompt（实时预览）</h2>
        <pre id="promptPreview"></pre>
      </section>
    </section>
  </main>

  <script>
    const basePrompt = `你是一名“知识编译器（Knowledge Compiler）”，而不是聊天助手。你的任务不是简单压缩文本，而是将对话式回答重构为适合长期知识沉淀的高密度 Markdown 笔记。

请将下面的内容从 conversational format 转换为 knowledge note format，并遵循以下规则：

# 核心目标

输出应满足：

* 信息密度高
* 逻辑连续
* 适合 Obsidian / Notion / Markdown 知识库
* 适合长期复习与检索
* 保持技术准确性
* 保持原文核心信息
* 不要保留聊天语气

你的目标是“保持原文信息不变”的前提下“改变原文格式”，“重建为真正的知识文档“。

---

# 一、文本压缩规则

## 1. 删除 conversational filler

删除或弱化以下类型表达（除非承担关键逻辑作用）：

* 你可以这样理解
* 换句话说
* 其实
* 注意
* 很重要
* hhh
* 我觉得
* 某种意义上
* 本质上（若重复出现）
* 你会发现
* 可以看到

删除实时对话中的情绪缓冲与节奏控制语句。

---

## 2. 合并碎片化短句（最核心任务）

将大量短句、小段落、频繁换行合并为自然技术段落。

避免：

一句一行 / 大量空行 / 像 PPT 一样碎片化。

应改为：

* 连续自然段
* 更强逻辑衔接
* 更接近 lecture note / textbook / research memo

# 二、Markdown 结构规则

## 4. 标题层级规则（由配置精确指定）

请严格按下方“标题映射配置”执行，不要自行发挥、不要保留抽象化描述。

---

## 6. 列表保留策略

结构化列表通常值得保留。

例如：

* pipeline
* 模块结构
* 优缺点
* 对比关系
* 数学对象
* 分步骤流程

不要为了“压缩”而强行取消所有 bullet list。

但允许：

* 合并过短列表
* 删除冗余 bullet
* 将弱结构列表转为自然段

---

## 7. 引用块处理

大多数 conversational quote block（blockquote）只是视觉强调，不是真正引用。

除非属于：

* theorem
* definition
* 原论文引用
* 关键结论
* prompt 模板

否则：

* 将引用块降级为正文
* 避免大量 blockquote 打断阅读流

---

# 三、技术内容保护规则

## 8. 必须严格保留：

* 代码块
* 数学公式
* LaTeX
* 文件路径
* API 名称
* 类名
* 函数名
* 变量名
* 配置字段
* tensor shape
* shell 命令

不得擅自修改其语义。

---

## 9. 数学与代码区域禁止“文学化”

技术区域保持：

* 精确
* 简洁
* 工程风格

不要加入聊天语气。

---

# 四、输出风格

输出风格应接近：

* 高质量技术博客
* 研究员私人笔记
* lecture notes
* paper reading memo
* engineering documentation

而不是：

* AI 聊天记录
* PPT
* 社交媒体文风

---`;

    const compression = {
      never: { desc: '完整保留信息', prompt: `compression_level: never\n\n不要压缩原文信息，也不要主动删减内容。只进行格式重构、标题整理、段落合并和聊天语气清理。\n\n要求：\n- 保留几乎所有有效信息点。\n- 不删除解释性例子，除非明显重复或无意义。\n- 不把多个技术步骤强行概括成一句话。\n- 允许改善表达，但不得减少知识密度。\n- 适合用于“完整留档”。` },
      light: { desc: '轻度整理', prompt: `compression_level: light\n\n进行轻度压缩，在保持信息完整的前提下删除明显冗余表达。\n\n要求：\n- 删除聊天填充语、重复强调、情绪性表达。\n- 合并碎片化短句。\n- 保留主要例子、关键类比、重要推理过程。\n- 对重复解释只保留最清晰的一版。\n- 不牺牲技术细节。\n- 适合用于“日常知识笔记”。` },
      medium: { desc: '高密度知识笔记', prompt: `compression_level: medium\n\n进行中度压缩，将内容整理为更高密度的知识笔记。\n\n要求：\n- 删除大部分重复解释、过渡语、弱例子。\n- 保留核心定义、机制、流程、对比、结论。\n- 将啰嗦推理压缩为紧凑技术段落。\n- 只保留最有助于理解的例子。\n- 避免过度简写导致概念断裂。\n- 适合用于“复习型笔记 / 长期知识库”。` },
      high: { desc: '极限压缩复习版', prompt: `compression_level: high\n\n进行高度压缩，将原文重构为高度凝练的知识笔记。\n\n要求：\n- 删除所有聊天语气、重复解释、弱过渡句和非必要例子。\n- 只保留核心概念、关键机制、重要流程、必要对比和最终结论。\n- 将长段解释压缩为紧凑的定义、流程或要点。\n- 保留代码、公式、变量名、类名、函数名、文件路径、tensor shape 等技术细节。\n- 删除只用于辅助理解、但不影响知识结构的类比和铺垫。\n- 不要压缩到提纲化碎片，仍需保持逻辑连续。\n- 适合用于“考试复习 / 快速回顾 / 高密度知识库”。` }
    };

    const state = { compression: 'medium', mode: 'unchanged', level: 1, content: '' };

    const seg = document.getElementById('compressionSeg');
    const desc = document.getElementById('compressionDesc');
    const mapMode = document.getElementById('mapMode');
    const mapLevel = document.getElementById('mapLevel');
    const mappingPreview = document.getElementById('mappingPreview');
    const contentInput = document.getElementById('contentInput');
    const promptPreview = document.getElementById('promptPreview');
    const copied = document.getElementById('copied');

    function renderCompressionButtons() {
      Object.keys(compression).forEach(key => {
        const b = document.createElement('button');
        b.textContent = key;
        b.dataset.key = key;
        b.addEventListener('click', () => { state.compression = key; update(); });
        seg.appendChild(b);
      });
    }

    function getHeadingRule(mode, level) {
      if (mode === 'unchanged') {
        return {
          text: `heading_offset: 0\n\n标题映射配置（确定性执行）：\n- 全部标题保持原层级，不做整体偏移。\n- h1 -> h1\n- h2 -> h2\n- h3 -> h3\n- h4 -> h4\n- h5 -> h5\n- h6 -> h6\n\n执行要求：\n- 不允许“提升/降低标题层级”的自由发挥。\n- 若需要结构优化，只能改标题文案，不改层级。`,
          preview: 'h2 → h2\nh3 → h3\nh4 → h4'
        };
      }
      const shift = mode === 'up' ? -level : level;
      const map = n => `h${n} -> h${Math.max(1, Math.min(6, n + shift))}`;
      const modeText = mode === 'up' ? `上移 ${level} 级` : `下移 ${level} 级`;
      const boundary = mode === 'up'
        ? '- 若上移后小于 h1，则强制保持为 h1。'
        : '- 若下移后超过 h6，则强制保持为 h6 或转为加粗正文。';

      return {
        text: `heading_offset: ${shift > 0 ? `+${shift}` : shift}\n\n标题映射配置（确定性执行）：${modeText}\n\n逐级映射规则（按此硬性执行）：\n- ${map(1)}\n- ${map(2)}\n- ${map(3)}\n- ${map(4)}\n- ${map(5)}\n- ${map(6)}\n\n执行要求：\n- 不允许模型自行推断其它偏移策略。\n${boundary}\n- 若多个标题映射后同级，按语义重排内容顺序，但不得改变本映射规则。`,
        preview: `h2 → h${Math.max(1, Math.min(6, 2 + shift))}\nh3 → h${Math.max(1, Math.min(6, 3 + shift))}\nh4 → h${Math.max(1, Math.min(6, 4 + shift))}`
      };
    }

    function buildPrompt() {
      const heading = getHeadingRule(state.mode, state.level);
      const config = [
        compression[state.compression].prompt,
        '',
        '## 5. 标题层级偏移规则',
        '',
        heading.text,
      ].join('\n');
      const prompt = basePrompt.replace(
        '\n---\n\n## 6. 列表保留策略',
        `\n\n${config}\n\n---\n\n## 6. 列表保留策略`
      );
      return [
        prompt,
        '---',
        '请处理以下内容：',
        state.content || '{{CONTENT}}'
      ].join('\n');
    }

    function update() {
      [...seg.querySelectorAll('button')].forEach(b => b.classList.toggle('active', b.dataset.key === state.compression));
      desc.textContent = `${state.compression}：${compression[state.compression].desc}`;
      mapLevel.disabled = state.mode === 'unchanged';
      mappingPreview.textContent = getHeadingRule(state.mode, state.level).preview;
      promptPreview.textContent = buildPrompt();
    }

    document.getElementById('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(promptPreview.textContent);
      copied.classList.add('show');
      setTimeout(() => copied.classList.remove('show'), 1000);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      state.content = '';
      contentInput.value = '';
      update();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.compression = 'medium';
      state.mode = 'unchanged';
      state.level = 1;
      state.content = '';
      contentInput.value = '';
      mapMode.value = 'unchanged';
      mapLevel.value = '1';
      update();
    });

    mapMode.addEventListener('change', () => { state.mode = mapMode.value; update(); });
    mapLevel.addEventListener('input', () => {
      const v = Math.min(3, Math.max(1, Number(mapLevel.value) || 1));
      state.level = v;
      mapLevel.value = String(v);
      update();
    });
    contentInput.addEventListener('input', () => { state.content = contentInput.value; update(); });

    renderCompressionButtons();
    update();
  </script>
</body>
</html>
