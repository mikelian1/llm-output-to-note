<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Builder · 对话转知识笔记</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0d12;
      --panel: #121722;
      --panel-2: #171d2b;
      --text: #e7eaf3;
      --muted: #9ba3b6;
      --border: #283044;
      --accent: #5b8cff;
      --accent-2: #3f6ee8;
      --ok: #4dd8a6;
      --shadow: 0 8px 26px rgba(0, 0, 0, 0.25);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --panel-2: #f3f5fa;
        --text: #1f2430;
        --muted: #60697c;
        --border: #d6dceb;
        --accent: #376dff;
        --accent-2: #2457de;
        --ok: #12a06f;
        --shadow: 0 8px 20px rgba(32, 48, 85, 0.08);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .wrap { max-width: 1400px; margin: 0 auto; display: grid; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); }
    .header { padding: 20px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .sub { margin: 0; color: var(--muted); }
    .middle {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      min-height: 460px;
    }
    .config { padding: 16px; }
    .group { margin-bottom: 18px; }
    .label { font-size: 13px; color: var(--muted); margin-bottom: 10px; display: block; }
    .seg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .seg button {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 9px 8px; border-radius: 10px; cursor: pointer;
    }
    .seg button.active { border-color: var(--accent); color: white; background: var(--accent); }
    .tips { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.5; }
    .map-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    select, input[type='number'] {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px;
    }
    .mapping-preview { margin-top: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; color: var(--muted); background: var(--panel-2); padding: 10px; border-radius: 10px; }
    .ops { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 10px; padding: 9px 12px; cursor: pointer;
    }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-2); }
    .copied { font-size: 12px; color: var(--ok); opacity: 0; transition: opacity .15s; margin-left: 4px; }
    .copied.show { opacity: 1; }
    .preview { padding: 16px; display: flex; flex-direction: column; }
    .preview h2 { margin: 0 0 10px; font-size: 16px; }
    pre {
      margin: 0; white-space: pre-wrap; word-break: break-word; overflow: auto; background: var(--panel-2);
      border: 1px solid var(--border); border-radius: 10px; padding: 14px; flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; line-height: 1.45;
    }
    .content { padding: 16px; }
    .content textarea {
      width: 100%; min-height: 280px; resize: vertical; background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; padding: 12px; font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    @media (max-width: 980px) { .middle { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card header">
      <h1>对话内容 → Markdown 知识笔记 Prompt 生成器</h1>
      <p class="sub">配置压缩等级与标题映射，实时生成最终 Prompt。</p>
    </section>

    <section class="middle">
      <aside class="card config">
        <div class="group">
          <span class="label">压缩等级</span>
          <div class="seg" id="compressionSeg"></div>
          <div class="tips" id="compressionDesc"></div>
        </div>

        <div class="group">
          <span class="label">标题映射</span>
          <div class="map-row">
            <select id="mapMode">
              <option value="unchanged">保持不变</option>
              <option value="up">上移</option>
              <option value="down">下移</option>
            </select>
            <input id="mapLevel" type="number" min="1" max="3" value="1" />
            <span style="color: var(--muted); font-size: 12px;">级</span>
          </div>
          <div id="mappingPreview" class="mapping-preview"></div>
        </div>

        <div class="group">
          <span class="label">Prompt 操作</span>
          <div class="ops">
            <button class="btn primary" id="copyBtn">一键复制 Prompt</button>
            <button class="btn" id="clearBtn">清空内容</button>
            <button class="btn" id="resetBtn">恢复默认设置</button>
            <span id="copied" class="copied">Copied</span>
          </div>
        </div>
      </aside>

      <section class="card preview">
        <h2>最终 Prompt 预览</h2>
        <pre id="promptPreview"></pre>
      </section>
    </section>

    <section class="card content">
      <label class="label" for="contentInput">待转换内容 {{CONTENT}}</label>
      <textarea id="contentInput" placeholder="在这里粘贴对话内容…"></textarea>
    </section>
  </div>

  <script>
    const basePrompt = `你是一名“知识编译器（Knowledge Compiler）”，而不是聊天助手。你的任务不是简单压缩文本，而是将对话式回答重构为适合长期知识沉淀的高密度 Markdown 笔记。

请将下面的内容从 conversational format 转换为 knowledge note format，并遵循以下规则：

# 核心目标

输出应满足：

* 信息密度高
* 逻辑连续
* 适合 Obsidian / Notion / Markdown 知识库
* 适合长期复习与检索
* 保持技术准确性
* 保持原文核心信息
* 不要保留聊天语气

你的目标是“保持原文信息不变”的前提下“改变原文格式”，“重建为真正的知识文档“。

---

# 一、文本压缩规则

## 1. 删除 conversational filler

删除或弱化以下类型表达（除非承担关键逻辑作用）：

* 你可以这样理解
* 换句话说
* 其实
* 注意
* 很重要
* hhh
* 我觉得
* 某种意义上
* 本质上（若重复出现）
* 你会发现
* 可以看到

删除实时对话中的情绪缓冲与节奏控制语句。

---

## 2. 合并碎片化短句（最核心任务）

将大量短句、小段落、频繁换行合并为自然技术段落。

避免：

一句一行 / 大量空行 / 像 PPT 一样碎片化。

应改为：

* 连续自然段
* 更强逻辑衔接
* 更接近 lecture note / textbook / research memo


# 二、Markdown 结构规则

## 4. 标题层级允许重构

不要机械保留原标题层级。

标题应根据“知识结构”而不是“聊天节奏”重新组织。

允许：

* 删除过碎标题
* 合并 sibling headings
* 提升/降低标题层级
* 将小标题降级为正文加粗
* 自动抽象更合理的标题

目标：

构建语义树，而不是聊天树。

---

## 5 标题层级偏移规则（Heading Offset Policy）

不要机械保留原标题层级。

标题层级应支持“整体顺延（global heading offset）”。

使用以下配置：

\`\`\`yaml
heading_offset: {heading_offset}
\`\`\`

其中：

* \`heading_offset = 0\`

  表示保持原层级不变：

  \`\`\`text
  h1 -> h1
  h2 -> h2
  h3 -> h3
  \`\`\`

* \`heading_offset = +1\`

  表示整体下移一级：

  \`\`\`text
  h1 -> h2
  h2 -> h3
  h3 -> h4
  \`\`\`

* \`heading_offset = -1\`

  表示整体上移一级：

  \`\`\`text
  h2 -> h1
  h3 -> h2
  h4 -> h3
  \`\`\`

若层级超过 Markdown 最大标题层级：

* 可自动转为加粗正文
* 或只能保留在最大层级

---

## 6. 列表保留策略

结构化列表通常值得保留。

例如：

* pipeline
* 模块结构
* 优缺点
* 对比关系
* 数学对象
* 分步骤流程

不要为了“压缩”而强行取消所有 bullet list。

但允许：

* 合并过短列表
* 删除冗余 bullet
* 将弱结构列表转为自然段

---

## 7. 引用块处理

大多数 conversational quote block（blockquote）只是视觉强调，不是真正引用。

除非属于：

* theorem
* definition
* 原论文引用
* 关键结论
* prompt 模板

否则：

* 将引用块降级为正文
* 避免大量 blockquote 打断阅读流

---

# 三、技术内容保护规则

## 8. 必须严格保留：

* 代码块
* 数学公式
* LaTeX
* 文件路径
* API 名称
* 类名
* 函数名
* 变量名
* 配置字段
* tensor shape
* shell 命令

不得擅自修改其语义。

---

## 9. 数学与代码区域禁止“文学化”

技术区域保持：

* 精确
* 简洁
* 工程风格

不要加入聊天语气。

---

# 四、输出风格

输出风格应接近：

* 高质量技术博客
* 研究员私人笔记
* lecture notes
* paper reading memo
* engineering documentation

而不是：

* AI 聊天记录
* PPT
* 社交媒体文风

---`;

    const compression = {
      never: {
        desc: '完整保留信息',
        prompt: `compression_level: never\n\n不要压缩原文信息，也不要主动删减内容。只进行格式重构、标题整理、段落合并和聊天语气清理。\n\n要求：\n- 保留几乎所有有效信息点。\n- 不删除解释性例子，除非明显重复或无意义。\n- 不把多个技术步骤强行概括成一句话。\n- 允许改善表达，但不得减少知识密度。\n- 适合用于“完整留档”。`
      },
      light: {
        desc: '轻度整理',
        prompt: `compression_level: light\n\n进行轻度压缩，在保持信息完整的前提下删除明显冗余表达。\n\n要求：\n- 删除聊天填充语、重复强调、情绪性表达。\n- 合并碎片化短句。\n- 保留主要例子、关键类比、重要推理过程。\n- 对重复解释只保留最清晰的一版。\n- 不牺牲技术细节。\n- 适合用于“日常知识笔记”。`
      },
      medium: {
        desc: '高密度知识笔记',
        prompt: `compression_level: medium\n\n进行中度压缩，将内容整理为更高密度的知识笔记。\n\n要求：\n- 删除大部分重复解释、过渡语、弱例子。\n- 保留核心定义、机制、流程、对比、结论。\n- 将啰嗦推理压缩为紧凑技术段落。\n- 只保留最有助于理解的例子。\n- 避免过度简写导致概念断裂。\n- 适合用于“复习型笔记 / 长期知识库”。`
      },
      high: {
        desc: '极限压缩复习版',
        prompt: `compression_level: high\n\n进行高度压缩，将原文重构为高度凝练的知识笔记。\n\n要求：\n- 删除所有聊天语气、重复解释、弱过渡句和非必要例子。\n- 只保留核心概念、关键机制、重要流程、必要对比和最终结论。\n- 将长段解释压缩为紧凑的定义、流程或要点。\n- 保留代码、公式、变量名、类名、函数名、文件路径、tensor shape 等技术细节。\n- 删除只用于辅助理解、但不影响知识结构的类比和铺垫。\n- 不要压缩到提纲化碎片，仍需保持逻辑连续。\n- 适合用于“考试复习 / 快速回顾 / 高密度知识库”。`
      }
    };

    const titleMappingTemplates = {
      unchanged: `heading_offset: 0\n\n标题层级整体保持不变。\n\n映射规则：\n- h1 -> h1\n- h2 -> h2\n- h3 -> h3\n- h4 -> h4\n- h5 -> h5\n- h6 -> h6\n\n允许根据知识结构微调标题内容，但不要整体改变标题层级。`,
      up: `heading_offset: -{x}\n\n标题层级整体上移 {x} 级。\n\n映射规则：\n- h(n) -> h(n - {x})\n\n例如 x = 1：\n- h2 -> h1\n- h3 -> h2\n- h4 -> h3\n\n约束：\n- h1 不能继续上移，保持为 h1。\n- 若多个标题因上移产生层级冲突，应根据语义结构合并或重组。\n- 不要机械移动标题，最终结构仍应符合知识笔记的逻辑层级。`,
      down: `heading_offset: +{x}\n\n标题层级整体下移 {x} 级。\n\n映射规则：\n- h(n) -> h(n + {x})\n\n例如 x = 1：\n- h1 -> h2\n- h2 -> h3\n- h3 -> h4\n\n约束：\n- 若标题层级超过 h6，可转为加粗正文，或保留为 h6。\n- 下移后应保持文档结构清晰，避免产生过深层级。\n- 不要机械移动标题，必要时可合并过碎小标题。`
    };

    const state = { compression: 'medium', mode: 'unchanged', level: 1, content: '' };

    const seg = document.getElementById('compressionSeg');
    const desc = document.getElementById('compressionDesc');
    const mapMode = document.getElementById('mapMode');
    const mapLevel = document.getElementById('mapLevel');
    const mappingPreview = document.getElementById('mappingPreview');
    const contentInput = document.getElementById('contentInput');
    const promptPreview = document.getElementById('promptPreview');
    const copied = document.getElementById('copied');

    function renderCompressionButtons() {
      Object.keys(compression).forEach(key => {
        const b = document.createElement('button');
        b.textContent = key;
        b.addEventListener('click', () => { state.compression = key; update(); });
        b.dataset.key = key;
        seg.appendChild(b);
      });
    }

    function buildTitleMapping() {
      if (state.mode === 'unchanged') return titleMappingTemplates.unchanged;
      return titleMappingTemplates[state.mode].replaceAll('{x}', String(state.level));
    }

    function buildMapPreview() {
      const x = state.mode === 'unchanged' ? 0 : state.level;
      const sign = state.mode === 'up' ? -1 : state.mode === 'down' ? 1 : 0;
      const map = n => {
        const v = n + sign * x;
        return 'h' + Math.min(6, Math.max(1, v));
      };
      return `h2 → ${map(2)}\nh3 → ${map(3)}\nh4 → ${map(4)}`;
    }

    function buildPrompt() {
      return [
        basePrompt,
        '',
        '---',
        compression[state.compression].prompt,
        '---',
        buildTitleMapping(),
        '---',
        '请处理以下内容：',
        state.content || '{{CONTENT}}'
      ].join('\n');
    }

    function update() {
      [...seg.querySelectorAll('button')].forEach(b => b.classList.toggle('active', b.dataset.key === state.compression));
      desc.textContent = `${state.compression}：${compression[state.compression].desc}`;
      mapLevel.disabled = state.mode === 'unchanged';
      mappingPreview.textContent = buildMapPreview();
      promptPreview.textContent = buildPrompt();
    }

    document.getElementById('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(promptPreview.textContent);
      copied.classList.add('show');
      setTimeout(() => copied.classList.remove('show'), 1000);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      state.content = '';
      contentInput.value = '';
      update();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.compression = 'medium';
      state.mode = 'unchanged';
      state.level = 1;
      state.content = '';
      contentInput.value = '';
      mapMode.value = 'unchanged';
      mapLevel.value = '1';
      update();
    });

    mapMode.addEventListener('change', () => { state.mode = mapMode.value; update(); });
    mapLevel.addEventListener('input', () => {
      const v = Math.min(3, Math.max(1, Number(mapLevel.value) || 1));
      state.level = v;
      mapLevel.value = String(v);
      update();
    });
    contentInput.addEventListener('input', () => { state.content = contentInput.value; update(); });

    renderCompressionButtons();
    update();
  </script>
</body>
</html>
